<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kaulbarsch">
  <defs>
    <linearGradient id="kbb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a5a40"/>
      <stop offset="0.5" stop-color="#8f8a5e"/>
      <stop offset="0.78" stop-color="#ddd6ac"/>
      <stop offset="1" stop-color="#f4f0dc"/>
    </linearGradient>
  </defs>
  <!-- tail -->
  <path d="M242 102 L274 84 L268 100 L276 102 L268 104 L274 120 Z" fill="#6e6a48" stroke="#42402c" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: small, perch-like -->
  <path d="M52 104 C62 88 84 74 114 70 C152 65 192 72 218 84 C232 90 240 96 242 102 C240 108 232 114 220 119 C194 130 154 136 118 132 C86 128 64 120 52 104 Z" fill="url(#kbb)" stroke="#42402c" stroke-width="2.5"/>
  <!-- fused dorsal: spiny front + soft back in one fin -->
  <path d="M108 72 L114 46 L126 44 L138 45 L150 48 L160 54 C170 52 184 54 196 60 C192 68 190 76 189 82 L112 72 Z" fill="#8a865c" opacity="0.92" stroke="#42402c" stroke-width="2" stroke-linejoin="round"/>
  <g stroke="#42402c" stroke-width="1.3" opacity="0.8">
    <path d="M114 47 L112 70"/><path d="M126 44.5 L122 70"/><path d="M138 45.5 L132 70"/><path d="M150 49 L142 71"/>
  </g>
  <!-- anal fin -->
  <path d="M182 126 C187 136 199 141 208 138 C204 131 202 124 201 118 Z" fill="#8a865c" stroke="#42402c" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic -->
  <path d="M120 128 C124 138 134 143 143 141 C139 134 137 128 136 122 Z" fill="#8a865c" stroke="#42402c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- pectoral -->
  <path d="M98 110 C104 119 114 123 122 121 C118 114 116 109 115 104 Z" fill="#9b9668" stroke="#42402c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- dark speckles all over -->
  <g fill="#3c3a24" opacity="0.7">
    <circle cx="120" cy="86" r="2.2"/><circle cx="136" cy="96" r="2"/><circle cx="150" cy="84" r="2.2"/><circle cx="164" cy="98" r="2"/>
    <circle cx="176" cy="88" r="2.2"/><circle cx="192" cy="98" r="2"/><circle cx="206" cy="92" r="2"/><circle cx="146" cy="112" r="2"/>
    <circle cx="170" cy="112" r="2"/><circle cx="194" cy="110" r="1.8"/><circle cx="216" cy="102" r="1.8"/><circle cx="128" cy="104" r="1.8"/>
    <circle cx="125" cy="55" r="1.6"/><circle cx="137" cy="58" r="1.6"/><circle cx="148" cy="60" r="1.6"/>
  </g>
  <!-- slime sheen -->
  <path d="M84 84 C130 72 186 74 216 86" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
  <!-- gill cover -->
  <path d="M92 82 C100 92 100 112 93 122" fill="none" stroke="#42402c" stroke-width="2" stroke-linecap="round"/>
  <!-- mouth: small -->
  <path d="M52 104 C60 100 68 98 76 98" fill="none" stroke="#42402c" stroke-width="2" stroke-linecap="round"/>
  <!-- big eye -->
  <circle cx="80" cy="90" r="8.5" fill="#d9cfa0"/>
  <circle cx="80" cy="90" r="4.4" fill="#221f12"/>
  <circle cx="82" cy="88" r="1.5" fill="#ffffff"/>
</svg>
