<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Meerforelle">
  <defs>
    <linearGradient id="mfb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46505a"/>
      <stop offset="0.45" stop-color="#9aa6b0"/>
      <stop offset="0.72" stop-color="#e5e9eb"/>
      <stop offset="1" stop-color="#fcfdfd"/>
    </linearGradient>
  </defs>
  <!-- tail: straight edge, thick wrist -->
  <path d="M262 100 L296 82 L292 98 L298 100 L292 102 L296 118 Z" fill="#63707c" stroke="#39434d" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: powerful, thick tail wrist -->
  <path d="M22 100 C34 84 62 72 100 68 C148 63 196 70 226 80 C244 87 254 94 258 100 C254 106 246 113 230 118 C200 128 152 133 106 129 C68 126 36 116 22 100 Z" fill="url(#mfb)" stroke="#39434d" stroke-width="2.5"/>
  <!-- dorsal fin -->
  <path d="M134 68 L143 44 L160 47 C155 56 152 65 151 75 Z" fill="#63707c" stroke="#39434d" stroke-width="2" stroke-linejoin="round"/>
  <!-- adipose fin -->
  <path d="M216 80 C222 74 230 74 234 78 C231 82 230 86 230 89 L218 86 Z" fill="#63707c" stroke="#39434d" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- anal fin -->
  <path d="M200 122 C205 132 216 137 226 134 C222 127 220 120 219 114 Z" fill="#63707c" stroke="#39434d" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic -->
  <path d="M144 128 C148 138 158 143 167 141 C163 134 161 128 160 123 Z" fill="#75828e" stroke="#39434d" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- pectoral -->
  <path d="M90 108 C96 118 107 122 115 120 C111 113 109 108 108 103 Z" fill="#75828e" stroke="#39434d" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- round black spots above AND below lateral line (key marker) -->
  <g fill="#252b31" opacity="0.85">
    <circle cx="102" cy="80" r="2.4"/><circle cx="124" cy="86" r="2.4"/><circle cx="148" cy="78" r="2.4"/><circle cx="172" cy="86" r="2.4"/>
    <circle cx="196" cy="80" r="2.4"/><circle cx="218" cy="88" r="2.2"/><circle cx="238" cy="92" r="2"/>
    <circle cx="112" cy="106" r="2.2"/><circle cx="136" cy="110" r="2.2"/><circle cx="160" cy="106" r="2.2"/><circle cx="184" cy="110" r="2.2"/>
    <circle cx="206" cy="106" r="2"/><circle cx="88" cy="94" r="2.2"/><circle cx="76" cy="88" r="2"/><circle cx="94" cy="112" r="2"/>
  </g>
  <!-- lateral line -->
  <path d="M92 100 C150 104 204 102 246 99" fill="none" stroke="#39434d" stroke-width="1.3" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.6"/>
  <!-- silver sheen -->
  <path d="M64 84 C130 68 200 72 242 84" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" opacity="0.6"/>
  <!-- gill cover -->
  <path d="M84 76 C94 86 94 112 85 122" fill="none" stroke="#39434d" stroke-width="2" stroke-linecap="round"/>
  <!-- mouth gape past the eye -->
  <path d="M22 100 C36 94 52 90 68 89" fill="none" stroke="#39434d" stroke-width="2.4" stroke-linecap="round"/>
  <!-- eye -->
  <circle cx="58" cy="86" r="6.5" fill="#e7e9df"/>
  <circle cx="58" cy="86" r="3.3" fill="#1c2126"/>
  <circle cx="59.4" cy="84.6" r="1.1" fill="#ffffff"/>
</svg>
