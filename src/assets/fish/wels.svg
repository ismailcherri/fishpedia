<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Wels">
  <defs>
    <linearGradient id="wb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c4245"/>
      <stop offset="0.55" stop-color="#5f6a63"/>
      <stop offset="0.8" stop-color="#c9c4a2"/>
      <stop offset="1" stop-color="#efe9d2"/>
    </linearGradient>
  </defs>
  <!-- tail: small, rounded -->
  <path d="M284 102 C296 92 304 90 310 92 C306 98 306 106 309 112 C302 114 293 112 284 106 Z" fill="#4d5751" stroke="#2e3634" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: massive head tapering to tail -->
  <path d="M14 96 C24 74 56 60 96 60 C150 60 214 74 258 88 C274 93 284 98 287 103 C284 108 272 112 256 114 C210 120 150 122 100 118 C58 114 26 110 14 96 Z" fill="url(#wb)" stroke="#2e3634" stroke-width="2.5"/>
  <!-- very long anal fin -->
  <path d="M104 118 C140 134 210 136 262 122 C258 116 256 112 255 108 C210 120 150 122 108 116 Z" fill="#55605a" stroke="#2e3634" stroke-width="2" stroke-linejoin="round"/>
  <!-- tiny dorsal fin -->
  <path d="M128 62 L134 46 L146 44 L146 60 Z" fill="#55605a" stroke="#2e3634" stroke-width="2" stroke-linejoin="round"/>
  <!-- pectoral fin -->
  <path d="M82 104 C90 116 104 121 114 118 C109 110 107 104 106 98 Z" fill="#55605a" stroke="#2e3634" stroke-width="2" stroke-linejoin="round"/>
  <!-- marbling -->
  <g fill="#333c39" opacity="0.5">
    <path d="M120 70 C132 66 144 70 150 78 C140 80 128 78 120 70 Z"/>
    <path d="M164 74 C178 70 192 76 198 84 C186 86 172 82 164 74 Z"/>
    <path d="M212 84 C224 80 236 84 242 92 C232 94 220 90 212 84 Z"/>
    <path d="M140 94 C152 90 164 94 170 102 C158 104 148 100 140 94 Z"/>
    <path d="M188 98 C198 94 208 98 214 104 C204 108 194 104 188 98 Z"/>
    <path d="M234 100 C242 97 250 100 254 105 C246 108 238 105 234 100 Z"/>
  </g>
  <!-- wide mouth -->
  <path d="M14 96 C30 92 52 90 70 91" fill="none" stroke="#2e3634" stroke-width="2.5" stroke-linecap="round"/>
  <!-- long upper barbels -->
  <path d="M34 88 C20 70 12 52 16 34" fill="none" stroke="#2e3634" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M46 87 C40 66 42 48 52 34" fill="none" stroke="#2e3634" stroke-width="2.6" stroke-linecap="round"/>
  <!-- short lower barbels -->
  <path d="M28 100 C24 110 18 116 10 118 M40 102 C38 112 33 118 26 121 M52 103 C51 112 47 118 41 121 M64 103 C64 111 61 116 56 119" fill="none" stroke="#2e3634" stroke-width="2" stroke-linecap="round"/>
  <!-- small eye -->
  <circle cx="56" cy="80" r="4.5" fill="#cfd3c3"/>
  <circle cx="56" cy="80" r="2.4" fill="#191f1d"/>
  <circle cx="57" cy="79" r="0.9" fill="#ffffff"/>
</svg>
