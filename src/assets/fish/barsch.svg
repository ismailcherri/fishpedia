<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Flussbarsch">
  <defs>
    <linearGradient id="pb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f5a3d"/>
      <stop offset="0.5" stop-color="#7ba05e"/>
      <stop offset="0.78" stop-color="#d9d9a8"/>
      <stop offset="1" stop-color="#f3f2df"/>
    </linearGradient>
  </defs>
  <!-- tail: reddish -->
  <path d="M256 100 L292 78 L285 98 L294 100 L285 102 L292 122 Z" fill="#c8542e" stroke="#7c3116" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: deep, humpbacked -->
  <path d="M30 104 C42 84 68 66 106 60 C152 53 200 62 232 78 C248 86 258 94 260 100 C258 106 248 112 234 118 C202 132 154 140 110 136 C70 132 44 122 30 104 Z" fill="url(#pb)" stroke="#31452e" stroke-width="2.5"/>
  <!-- first dorsal: spiny with black blotch at rear -->
  <path d="M100 62 L106 26 L118 24 L132 24 L146 27 L158 33 L168 42 L172 56 L166 62 Z" fill="#8aa578" opacity="0.92" stroke="#31452e" stroke-width="2" stroke-linejoin="round"/>
  <g stroke="#31452e" stroke-width="1.5" opacity="0.85">
    <path d="M106 27 L104 60"/><path d="M118 24.5 L114 60"/><path d="M132 24.5 L126 60"/><path d="M146 28 L138 59"/><path d="M158 34 L150 58"/><path d="M168 43 L160 58"/>
  </g>
  <ellipse cx="163" cy="50" rx="7" ry="8" fill="#1d2718" opacity="0.85"/>
  <!-- second dorsal -->
  <path d="M186 60 C196 50 214 48 228 54 C224 62 222 70 221 76 L188 66 Z" fill="#9db388" opacity="0.9" stroke="#31452e" stroke-width="2" stroke-linejoin="round"/>
  <!-- anal fin: red -->
  <path d="M196 126 C202 138 216 143 226 140 C222 132 220 125 219 119 Z" fill="#d95f36" stroke="#7c3116" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic fin: bright red -->
  <path d="M118 132 C122 144 134 149 144 147 C140 139 138 133 137 127 Z" fill="#d95f36" stroke="#7c3116" stroke-width="2" stroke-linejoin="round"/>
  <!-- pectoral -->
  <path d="M92 108 C98 118 109 122 117 120 C113 113 111 108 110 103 Z" fill="#b8874f" stroke="#31452e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- dark vertical stripes, tapering -->
  <g fill="#2f4530" opacity="0.6">
    <path d="M108 62 C114 84 114 110 109 132 L100 130 C104 110 104 84 100 64 Z"/>
    <path d="M134 58 C140 82 140 112 135 136 L126 134 C130 112 130 82 126 58 Z"/>
    <path d="M160 58 C166 82 166 110 161 134 L152 133 C156 110 156 82 152 58 Z"/>
    <path d="M186 62 C191 82 191 106 187 126 L178 125 C182 106 182 82 178 62 Z"/>
    <path d="M212 70 C216 84 216 102 213 116 L205 114 C208 101 208 84 205 70 Z"/>
    <path d="M234 80 C237 90 237 102 235 110 L228 108 C230 100 230 90 228 80 Z"/>
  </g>
  <!-- gill cover with spike -->
  <path d="M82 74 C92 86 92 112 83 126" fill="none" stroke="#31452e" stroke-width="2" stroke-linecap="round"/>
  <path d="M88 100 l8 3 -8 3" fill="none" stroke="#31452e" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- mouth -->
  <path d="M30 104 C40 98 52 95 62 95" fill="none" stroke="#31452e" stroke-width="2" stroke-linecap="round"/>
  <!-- eye -->
  <circle cx="60" cy="84" r="7.5" fill="#e8c56a"/>
  <circle cx="60" cy="84" r="3.8" fill="#1c2417"/>
  <circle cx="61.5" cy="82.5" r="1.3" fill="#ffffff"/>
</svg>
