<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Steinbeißer">
  <defs>
    <linearGradient id="steb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a8a5c"/>
      <stop offset="0.55" stop-color="#c9b988"/>
      <stop offset="1" stop-color="#efe6c8"/>
    </linearGradient>
  </defs>
  <!-- tail: rounded with speckle bands -->
  <path d="M270 100 C280 93 288 91 295 93 C292 98 292 104 295 109 C288 111 280 108 270 103 Z" fill="#b3a273" stroke="#5f5433" stroke-width="2" stroke-linejoin="round"/>
  <path d="M276 96 l3 0 M282 95 l3 0 M278 104 l3 0 M285 102 l3 0" stroke="#5f5433" stroke-width="1.6" stroke-linecap="round"/>
  <!-- body: slender ribbon -->
  <path d="M20 102 C30 96 50 92 76 91 C130 89 200 90 246 94 C260 96 268 98 270 100 C268 103 260 105 246 106 C200 110 130 111 78 109 C50 108 30 106 20 102 Z" fill="url(#steb)" stroke="#5f5433" stroke-width="2.5"/>
  <!-- small dorsal fin -->
  <path d="M148 91 L154 74 L166 76 C162 82 160 87 159 93 Z" fill="#b3a273" stroke="#5f5433" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- small anal fin -->
  <path d="M196 108 C199 115 206 119 213 117 C210 112 208 107 207 103 Z" fill="#b3a273" stroke="#5f5433" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- pelvic -->
  <path d="M140 109 C142 116 148 120 155 119 C152 114 150 110 149 106 Z" fill="#bcac7d" stroke="#5f5433" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- pectoral -->
  <path d="M76 106 C80 113 88 117 95 115 C92 110 90 106 89 102 Z" fill="#bcac7d" stroke="#5f5433" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- row of large dark blotches along flank (key marker) -->
  <g fill="#55482a" opacity="0.85">
    <ellipse cx="92" cy="100" rx="7" ry="4"/>
    <ellipse cx="116" cy="100" rx="7" ry="4"/>
    <ellipse cx="140" cy="100" rx="7" ry="4"/>
    <ellipse cx="164" cy="100" rx="7" ry="4"/>
    <ellipse cx="188" cy="100" rx="7" ry="4"/>
    <ellipse cx="212" cy="100" rx="6.5" ry="3.8"/>
    <ellipse cx="234" cy="100" rx="6" ry="3.5"/>
    <ellipse cx="254" cy="100" rx="5" ry="3"/>
  </g>
  <!-- fine speckle row on back -->
  <g fill="#55482a" opacity="0.55">
    <circle cx="100" cy="93" r="1.4"/><circle cx="124" cy="93" r="1.4"/><circle cx="148" cy="92" r="1.4"/><circle cx="172" cy="93" r="1.4"/>
    <circle cx="196" cy="93" r="1.4"/><circle cx="220" cy="94" r="1.3"/><circle cx="242" cy="95" r="1.2"/>
  </g>
  <!-- six barbels at small underslung mouth -->
  <path d="M22 104 C21 109 19 113 15 115 M28 105 C27 110 25 113 22 116 M34 105 C34 110 32 114 29 116 M40 106 C40 110 38 113 36 116 M46 106 C46 110 45 113 43 115 M52 106 C52 110 51 112 49 114" fill="none" stroke="#5f5433" stroke-width="1.6" stroke-linecap="round"/>
  <!-- spine under eye (name-giving) -->
  <path d="M44 98 l6 2 -6 2" fill="none" stroke="#5f5433" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- eye: small, high -->
  <circle cx="50" cy="95" r="3.6" fill="#e3d7ae"/>
  <circle cx="50" cy="95" r="1.9" fill="#241f10"/>
  <circle cx="50.8" cy="94.2" r="0.7" fill="#ffffff"/>
</svg>
