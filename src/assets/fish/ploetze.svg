<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Plötze">
  <defs>
    <linearGradient id="plb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#44546a"/>
      <stop offset="0.45" stop-color="#93a5b5"/>
      <stop offset="0.75" stop-color="#dde5e8"/>
      <stop offset="1" stop-color="#f8fafa"/>
    </linearGradient>
  </defs>
  <!-- tail: reddish grey -->
  <path d="M252 100 L286 80 L279 98 L288 100 L279 102 L286 120 Z" fill="#a05a48" stroke="#5c3227" stroke-width="2" stroke-linejoin="round"/>
  <!-- body -->
  <path d="M38 102 C50 84 74 70 108 66 C148 61 190 68 218 80 C234 87 244 95 246 100 C244 106 236 112 222 118 C194 130 150 136 112 132 C78 128 52 118 38 102 Z" fill="url(#plb)" stroke="#3a4351" stroke-width="2.5"/>
  <!-- dorsal fin directly above pelvic fins -->
  <path d="M138 66 L146 40 L162 42 C158 52 155 62 154 72 Z" fill="#8496a5" stroke="#3a4351" stroke-width="2" stroke-linejoin="round"/>
  <!-- anal fin: reddish -->
  <path d="M192 124 C197 136 209 141 219 138 C215 130 213 123 212 117 Z" fill="#c26a50" stroke="#5c3227" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic fins: reddish, below dorsal -->
  <path d="M140 130 C144 141 154 146 163 144 C159 137 157 131 156 125 Z" fill="#c26a50" stroke="#5c3227" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- pectoral -->
  <path d="M90 108 C96 118 107 122 115 120 C111 113 109 108 108 103 Z" fill="#9fb0bd" stroke="#3a4351" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- scale pattern: light diamond rows -->
  <g fill="none" stroke="#3a4351" stroke-width="0.9" opacity="0.3">
    <path d="M108 74 q6 7 0 14 M108 88 q6 7 0 14 M108 102 q6 7 0 14"/>
    <path d="M124 70 q6 7 0 14 M124 84 q6 7 0 14 M124 98 q6 7 0 14 M124 112 q5 6 0 12"/>
    <path d="M140 68 q6 7 0 14 M140 82 q6 7 0 14 M140 96 q6 7 0 14 M140 110 q6 7 0 14"/>
    <path d="M156 68 q6 7 0 14 M156 82 q6 7 0 14 M156 96 q6 7 0 14 M156 110 q6 7 0 14"/>
    <path d="M172 70 q6 7 0 14 M172 84 q6 7 0 14 M172 98 q6 7 0 14"/>
    <path d="M188 72 q6 7 0 14 M188 86 q6 7 0 14 M188 100 q6 7 0 14"/>
    <path d="M204 76 q5 6 0 12 M204 88 q5 6 0 12 M204 100 q5 6 0 12"/>
    <path d="M220 82 q5 6 0 12 M220 94 q5 6 0 12"/>
  </g>
  <!-- lateral line -->
  <path d="M96 104 C150 110 200 108 236 100" fill="none" stroke="#3a4351" stroke-width="1.3" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.6"/>
  <!-- gill cover -->
  <path d="M86 78 C95 90 95 112 87 122" fill="none" stroke="#3a4351" stroke-width="2" stroke-linecap="round"/>
  <!-- small mouth -->
  <path d="M38 102 C46 98 54 96 62 96" fill="none" stroke="#3a4351" stroke-width="2" stroke-linecap="round"/>
  <!-- red eye (namesake) -->
  <circle cx="64" cy="88" r="6.5" fill="#d84f30"/>
  <circle cx="64" cy="88" r="3.2" fill="#1f1812"/>
  <circle cx="65.4" cy="86.6" r="1.1" fill="#ffffff"/>
</svg>
