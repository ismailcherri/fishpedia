  <path d="M52 100 C51 95 49 91 46 89" fill="none" stroke="#54401c" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M50 112 C50 122 46 130 38 135" fill="none" stroke="#54401c" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M58 112 C59 121 56 128 50 133" fill="none" stroke="#54401c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- eye -->
  <circle cx="66" cy="92" r="6.5" fill="#e9d9a5"/>
  <circle cx="66" cy="92" r="3.3" fill="#241c0d"/>
  <circle cx="67.4" cy="90.6" r="1.1" fill="#ffffff"/>
