    <path d="M104 70 q7 8 0 16 M104 86 q7 8 0 16 M104 102 q7 8 0 16"/>
    <path d="M120 66 q7 8 0 16 M120 82 q7 8 0 16 M120 98 q7 8 0 16 M120 114 q6 7 0 14"/>
    <path d="M136 62 q7 8 0 16 M136 78 q7 8 0 16 M136 94 q7 8 0 16 M136 110 q7 8 0 16"/>
    <path d="M152 62 q7 8 0 16 M152 78 q7 8 0 16 M152 94 q7 8 0 16 M152 110 q7 8 0 16"/>
    <path d="M168 64 q7 8 0 16 M168 80 q7 8 0 16 M168 96 q7 8 0 16 M168 112 q6 7 0 14"/>
    <path d="M184 66 q7 8 0 16 M184 82 q7 8 0 16 M184 98 q7 8 0 16"/>
    <path d="M200 70 q6 8 0 16 M200 86 q6 8 0 16 M200 102 q6 7 0 14"/>
    <path d="M216 76 q6 7 0 14 M216 90 q6 7 0 14 M216 104 q5 6 0 12"/>
    <path d="M232 84 q5 6 0 12 M232 96 q5 6 0 12"/>
