  <!-- anal fin -->
  <path d="M198 128 C204 140 218 145 228 142 C224 134 222 127 221 121 Z" fill="#7d6330" stroke="#54401c" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic -->
  <path d="M126 134 C130 145 141 150 150 148 C146 141 144 134 143 129 Z" fill="#96793a" stroke="#54401c" stroke-width="1.8" stroke-linejoin="round"/>
