<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Karpfen">
  <defs>
    <linearGradient id="cb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b5426"/>
      <stop offset="0.5" stop-color="#a8863e"/>
      <stop offset="0.78" stop-color="#e0c988"/>
      <stop offset="1" stop-color="#f4ead0"/>
    </linearGradient>
  </defs>
  <!-- tail -->
  <path d="M254 102 L290 80 L283 100 L292 102 L283 104 L290 124 Z" fill="#8a6d31" stroke="#54401c" stroke-width="2" stroke-linejoin="round"/>
