<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Ukelei">
  <defs>
    <linearGradient id="ukb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#57636e"/>
      <stop offset="0.4" stop-color="#a9b8c2"/>
      <stop offset="0.65" stop-color="#e8edf0"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- tail: deeply forked -->
  <path d="M246 100 L282 78 L273 98 L284 100 L273 102 L282 122 Z" fill="#7a8894" stroke="#4a545e" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: slim, elongated -->
  <path d="M40 100 C52 88 78 78 112 74 C154 70 194 76 218 86 C232 92 240 96 242 100 C240 104 232 108 220 112 C196 120 156 126 116 124 C80 122 54 112 40 100 Z" fill="url(#ukb)" stroke="#4a545e" stroke-width="2.5"/>
  <!-- dorsal fin: small, set back -->
  <path d="M160 74 L167 54 L180 56 C176 64 174 70 173 78 Z" fill="#8a97a2" stroke="#4a545e" stroke-width="2" stroke-linejoin="round"/>
  <!-- long anal fin -->
  <path d="M172 122 C186 130 206 130 222 122 C219 117 217 112 216 107 C204 116 188 119 176 116 Z" fill="#8a97a2" stroke="#4a545e" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic -->
  <path d="M132 122 C135 131 144 136 152 134 C149 128 147 123 146 118 Z" fill="#98a5b0" stroke="#4a545e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- pectoral -->
  <path d="M92 108 C97 116 107 120 115 118 C111 112 109 107 108 103 Z" fill="#98a5b0" stroke="#4a545e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- bright silver flash -->
  <path d="M76 88 C130 76 186 78 216 88" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <path d="M84 98 C136 90 186 90 212 96" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- gill cover -->
  <path d="M86 82 C94 90 94 108 87 116" fill="none" stroke="#4a545e" stroke-width="2" stroke-linecap="round"/>
  <!-- strongly upturned mouth -->
  <path d="M40 100 C46 93 54 88 62 86 M38 96 C44 100 51 103 58 104" fill="none" stroke="#4a545e" stroke-width="2.2" stroke-linecap="round"/>
  <!-- eye: large -->
  <circle cx="66" cy="90" r="7" fill="#eceada"/>
  <circle cx="66" cy="90" r="3.4" fill="#1e2022"/>
  <circle cx="67.6" cy="88.4" r="1.2" fill="#ffffff"/>
</svg>
