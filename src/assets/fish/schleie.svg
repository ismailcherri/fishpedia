<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Schleie">
  <defs>
    <linearGradient id="sb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4a26"/>
      <stop offset="0.5" stop-color="#6d7c3a"/>
      <stop offset="0.78" stop-color="#c3bd75"/>
      <stop offset="1" stop-color="#e9e3b8"/>
    </linearGradient>
  </defs>
  <!-- tail: broad, barely forked -->
  <path d="M256 102 C270 90 282 86 292 88 C288 96 288 108 292 116 C282 118 270 114 256 104 Z" fill="#55622e" stroke="#333d1c" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: chunky with thick tail wrist -->
  <path d="M34 104 C46 84 72 68 110 64 C152 59 196 66 226 80 C244 88 254 96 256 102 C254 108 246 114 232 120 C202 132 156 138 114 134 C76 130 48 122 34 104 Z" fill="url(#sb)" stroke="#333d1c" stroke-width="2.5"/>
  <!-- rounded dorsal fin -->
  <path d="M138 64 C146 46 166 40 182 46 C176 56 173 66 172 74 Z" fill="#55622e" stroke="#333d1c" stroke-width="2" stroke-linejoin="round"/>
  <!-- rounded anal fin -->
  <path d="M188 128 C192 142 204 149 216 146 C212 137 210 129 209 122 Z" fill="#55622e" stroke="#333d1c" stroke-width="2" stroke-linejoin="round"/>
  <!-- rounded pelvic -->
  <path d="M124 132 C127 144 138 150 148 148 C144 140 142 133 141 127 Z" fill="#616f34" stroke="#333d1c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- rounded pectoral -->
  <path d="M90 110 C95 121 106 126 115 123 C111 116 109 110 108 105 Z" fill="#616f34" stroke="#333d1c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- fine scale sheen: golden shimmer dots -->
  <g fill="#d8cf87" opacity="0.5">
    <circle cx="120" cy="84" r="1.3"/><circle cx="132" cy="92" r="1.3"/><circle cx="144" cy="84" r="1.3"/><circle cx="156" cy="94" r="1.3"/>
    <circle cx="168" cy="86" r="1.3"/><circle cx="180" cy="96" r="1.3"/><circle cx="192" cy="88" r="1.3"/><circle cx="204" cy="98" r="1.3"/>
    <circle cx="216" cy="92" r="1.3"/><circle cx="126" cy="106" r="1.3"/><circle cx="150" cy="110" r="1.3"/><circle cx="174" cy="110" r="1.3"/>
    <circle cx="198" cy="110" r="1.3"/><circle cx="220" cy="104" r="1.3"/><circle cx="108" cy="94" r="1.3"/>
  </g>
  <!-- golden flank sheen -->
  <path d="M72 84 C130 68 196 72 236 88" fill="none" stroke="#e5d98f" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <!-- gill cover -->
  <path d="M86 80 C96 92 96 112 87 124" fill="none" stroke="#333d1c" stroke-width="2" stroke-linecap="round"/>
  <!-- small mouth with tiny corner barbels -->
  <path d="M34 104 C42 100 50 98 58 98" fill="none" stroke="#333d1c" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M50 106 C50 111 48 115 44 118 M57 106 C57 110 56 113 53 116" fill="none" stroke="#333d1c" stroke-width="1.8" stroke-linecap="round"/>
  <!-- red eye -->
  <circle cx="64" cy="90" r="6" fill="#c94f2a"/>
  <circle cx="64" cy="90" r="3" fill="#20180c"/>
  <circle cx="65.2" cy="88.8" r="1" fill="#ffffff"/>
</svg>
