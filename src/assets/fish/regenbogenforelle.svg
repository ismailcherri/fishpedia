  <g fill="#2e3826" opacity="0.8">
    <circle cx="100" cy="78" r="1.7"/><circle cx="114" cy="84" r="1.7"/><circle cx="128" cy="76" r="1.7"/><circle cx="142" cy="84" r="1.7"/>
    <circle cx="156" cy="76" r="1.7"/><circle cx="170" cy="84" r="1.7"/><circle cx="184" cy="78" r="1.7"/><circle cx="198" cy="86" r="1.7"/>
    <circle cx="212" cy="80" r="1.7"/><circle cx="226" cy="88" r="1.6"/><circle cx="238" cy="94" r="1.5"/><circle cx="108" cy="92" r="1.6"/>
    <circle cx="136" cy="94" r="1.6"/><circle cx="164" cy="92" r="1.6"/><circle cx="192" cy="94" r="1.6"/><circle cx="218" cy="96" r="1.5"/>
    <circle cx="122" cy="110" r="1.5"/><circle cx="152" cy="112" r="1.5"/><circle cx="182" cy="112" r="1.5"/><circle cx="208" cy="110" r="1.4"/>
    <circle cx="88" cy="84" r="1.6"/><circle cx="74" cy="90" r="1.5"/>
