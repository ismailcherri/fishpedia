  <path d="M196 122 C201 133 212 138 222 135 C218 128 216 121 215 115 Z" fill="#7a8a72" stroke="#3d4a3c" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic -->
  <path d="M140 127 C144 138 154 143 163 141 C159 134 157 128 156 122 Z" fill="#8a9a82" stroke="#3d4a3c" stroke-width="1.8" stroke-linejoin="round"/>
