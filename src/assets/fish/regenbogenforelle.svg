<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Regenbogenforelle">
  <defs>
    <linearGradient id="rgb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#44584a"/>
      <stop offset="0.45" stop-color="#93a894"/>
      <stop offset="0.72" stop-color="#e0e6da"/>
      <stop offset="1" stop-color="#f8faf5"/>
    </linearGradient>
  </defs>
  <!-- tail: speckled -->
  <path d="M258 100 C272 88 284 84 294 86 C290 94 290 108 294 116 C284 118 272 112 258 102 Z" fill="#7a8a72" stroke="#3d4a3c" stroke-width="2" stroke-linejoin="round"/>
