  </g>
  <!-- body -->
  <path d="M24 100 C36 84 62 72 98 68 C144 63 192 70 224 82 C240 88 250 95 252 100 C250 106 242 112 228 117 C198 128 152 133 106 129 C68 126 38 116 24 100 Z" fill="url(#rgb)" stroke="#3d4a3c" stroke-width="2.5"/>
  <!-- pink lateral band (key marker) -->
  <path d="M60 96 C120 88 190 90 240 98 C238 104 232 108 222 112 C180 104 120 102 64 106 C60 103 58 100 60 96 Z" fill="#d88a99" opacity="0.65"/>
