<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Lachs">
  <defs>
    <linearGradient id="lab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f4e5c"/>
      <stop offset="0.45" stop-color="#94a7b4"/>
      <stop offset="0.72" stop-color="#e2e9ec"/>
      <stop offset="1" stop-color="#fbfdfd"/>
    </linearGradient>
  </defs>
  <!-- tail: slightly forked, on a very slim wrist -->
  <path d="M266 100 L300 78 L292 97 L302 100 L292 103 L300 122 Z" fill="#5f7180" stroke="#37444f" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: streamlined with slim tail wrist -->
  <path d="M22 100 C34 84 62 72 100 68 C148 63 196 70 226 80 C244 86 252 92 254 97 C258 98 262 99 264 100 C262 101 258 102 254 103 C252 108 244 114 228 118 C198 127 150 132 106 128 C68 125 36 115 22 100 Z" fill="url(#lab)" stroke="#37444f" stroke-width="2.5"/>
  <!-- dorsal fin -->
  <path d="M134 68 L143 44 L160 47 C155 56 152 65 151 75 Z" fill="#5f7180" stroke="#37444f" stroke-width="2" stroke-linejoin="round"/>
  <!-- adipose fin -->
  <path d="M218 80 C224 74 232 74 236 78 C233 82 232 86 232 89 L220 86 Z" fill="#5f7180" stroke="#37444f" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- anal fin -->
  <path d="M202 122 C207 132 218 137 228 134 C224 127 222 120 221 114 Z" fill="#5f7180" stroke="#37444f" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic -->
  <path d="M144 127 C148 138 158 143 167 141 C163 134 161 128 160 122 Z" fill="#718392" stroke="#37444f" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- pectoral -->
  <path d="M90 108 C96 118 107 122 115 120 C111 113 109 108 108 103 Z" fill="#718392" stroke="#37444f" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- X-shaped spots above lateral line only (key marker) -->
  <g stroke="#252e36" stroke-width="1.8" stroke-linecap="round" opacity="0.85">
    <path d="M104 80 l6 6 M110 80 l-6 6"/>
    <path d="M130 86 l6 6 M136 86 l-6 6"/>
    <path d="M156 78 l6 6 M162 78 l-6 6"/>
    <path d="M182 86 l6 6 M188 86 l-6 6"/>
    <path d="M208 82 l5 5 M213 82 l-5 5"/>
    <path d="M230 88 l5 5 M235 88 l-5 5"/>
    <path d="M84 86 l5 5 M89 86 l-5 5"/>
  </g>
  <!-- lateral line -->
  <path d="M92 100 C150 106 204 104 244 99" fill="none" stroke="#37444f" stroke-width="1.3" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.6"/>
  <!-- bright silver sheen -->
  <path d="M64 84 C130 68 200 72 240 84" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" opacity="0.6"/>
  <!-- gill cover -->
  <path d="M84 76 C94 86 94 112 85 122" fill="none" stroke="#37444f" stroke-width="2" stroke-linecap="round"/>
  <!-- pointed head, mouth to eye level -->
  <path d="M22 100 C34 94 48 90 62 89" fill="none" stroke="#37444f" stroke-width="2.4" stroke-linecap="round"/>
  <!-- eye -->
  <circle cx="56" cy="86" r="6.5" fill="#e6e8dd"/>
  <circle cx="56" cy="86" r="3.3" fill="#1b2126"/>
  <circle cx="57.4" cy="84.6" r="1.1" fill="#ffffff"/>
</svg>
