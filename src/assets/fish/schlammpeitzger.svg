<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Schlammpeitzger">
  <defs>
    <linearGradient id="spb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b5a38"/>
      <stop offset="0.5" stop-color="#a08a56"/>
      <stop offset="0.8" stop-color="#d9c692"/>
      <stop offset="1" stop-color="#efe3c2"/>
    </linearGradient>
  </defs>
  <!-- tail: rounded -->
  <path d="M272 100 C282 92 291 90 298 92 C295 98 295 105 298 110 C291 112 282 109 272 104 Z" fill="#8a7647" stroke="#4c3f22" stroke-width="2" stroke-linejoin="round"/>
