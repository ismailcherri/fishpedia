<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Nase">
  <defs>
    <linearGradient id="nab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e4a52"/>
      <stop offset="0.45" stop-color="#8da0a8"/>
      <stop offset="0.72" stop-color="#dee5e6"/>
      <stop offset="1" stop-color="#f9fbfa"/>
    </linearGradient>
  </defs>
  <!-- tail: reddish base, dark fork -->
  <path d="M252 100 L288 78 L280 97 L290 100 L280 103 L288 122 Z" fill="#8a5a44" stroke="#4c3020" stroke-width="2" stroke-linejoin="round"/>
  <!-- body: slender -->
  <path d="M26 102 C38 90 64 80 100 76 C146 71 190 76 218 86 C234 92 242 97 244 101 C242 106 234 110 220 114 C192 122 148 127 106 124 C68 121 40 114 26 102 Z" fill="url(#nab)" stroke="#37424a" stroke-width="2.5"/>
  <!-- protruding snout over underslung mouth: the "nose" -->
  <path d="M26 102 C30 98 36 96 42 96 C38 100 34 102 30 103 Z" fill="#5e6d75" stroke="#37424a" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M30 108 C38 110 46 111 54 111" fill="none" stroke="#37424a" stroke-width="2.4" stroke-linecap="round"/>
  <!-- dorsal fin -->
  <path d="M142 76 L151 52 L166 55 C161 64 158 72 157 82 Z" fill="#5e6d75" stroke="#37424a" stroke-width="2" stroke-linejoin="round"/>
  <!-- anal fin: reddish base -->
  <path d="M194 120 C198 131 209 136 219 133 C215 126 213 120 212 114 Z" fill="#a56a50" stroke="#4c3020" stroke-width="2" stroke-linejoin="round"/>
  <!-- pelvic: reddish base -->
  <path d="M136 124 C140 134 150 139 159 137 C155 130 153 124 152 119 Z" fill="#a56a50" stroke="#4c3020" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- pectoral: reddish base -->
  <path d="M88 110 C94 119 105 123 113 121 C109 114 107 109 106 104 Z" fill="#a56a50" stroke="#4c3020" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- dark back / silver flank divide -->
  <path d="M64 86 C130 72 194 74 232 88" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>
  <!-- lateral line -->
  <path d="M92 102 C150 108 200 106 236 100" fill="none" stroke="#37424a" stroke-width="1.3" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.6"/>
  <!-- gill cover -->
  <path d="M80 82 C89 92 89 110 81 118" fill="none" stroke="#37424a" stroke-width="2" stroke-linecap="round"/>
  <!-- eye -->
  <circle cx="58" cy="90" r="6" fill="#e3dcc0"/>
  <circle cx="58" cy="90" r="3" fill="#1d1f1a"/>
  <circle cx="59.2" cy="88.8" r="1" fill="#ffffff"/>
</svg>
