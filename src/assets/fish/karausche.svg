  <!-- golden sheen -->
  <path d="M84 74 C130 56 178 60 206 80" fill="none" stroke="#f2df9a" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <!-- dark blotch on tail wrist (juvenile marker) -->
  <circle cx="242" cy="100" r="5" fill="#3c3212" opacity="0.65"/>
  <!-- gill cover -->
  <path d="M88 72 C97 86 97 116 89 130" fill="none" stroke="#4e4118" stroke-width="2" stroke-linecap="round"/>
  <!-- small mouth, no barbels -->
  <path d="M46 102 C52 99 58 97 64 97" fill="none" stroke="#4e4118" stroke-width="2.2" stroke-linecap="round"/>
  <!-- eye -->
  <circle cx="68" cy="90" r="6" fill="#e8d9a2"/>
  <circle cx="68" cy="90" r="3" fill="#221b0b"/>
  <circle cx="69.2" cy="88.8" r="1" fill="#ffffff"/>
</svg>
